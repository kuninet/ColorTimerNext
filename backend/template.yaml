AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  ColorTimerNext Backend

  SAM Template for ColorTimer Next Project (API Gateway + DynamoDB)

Globals:
  Function:
    Timeout: 5
    MemorySize: 128

Resources:
  # ----------------------------------------------------------------------
  # DynamoDB Table
  # ----------------------------------------------------------------------
  ColorTimerLogsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ColorTimerLogs
      # オンデマンド課金 (無料枠の範囲内で安価に収めるため)
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: DeviceId
          AttributeType: S
        - AttributeName: Timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: DeviceId
          KeyType: HASH
        - AttributeName: Timestamp
          KeyType: RANGE
      # TTLの設定 (ExpireAt)
      TimeToLiveSpecification:
        AttributeName: ExpireAt
        Enabled: true

  # ----------------------------------------------------------------------
  # API Gateway (REST API) with API Key
  # ----------------------------------------------------------------------
  ColorTimerApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,X-Api-Key'"
        AllowMethods: "'GET,POST,OPTIONS'"
      Auth:
        ApiKeyRequired: true # 全メソッドに対してデフォルトでAPIキーを要求する
        UsagePlan:
          CreateUsagePlan: PER_API
          Description: "ColorTimerNext Usage Plan"

  # ----------------------------------------------------------------------
  # Receiver Lambda Function
  # ----------------------------------------------------------------------
  ReceiverFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/receiver/
      Handler: app.handler
      Runtime: nodejs20.x
      Architectures:
        - x86_64
      Environment:
        Variables:
          TABLE_NAME: !Ref ColorTimerLogsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ColorTimerLogsTable
      Events:
        ReceiverApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ColorTimerApi
            Method: POST
            Path: /api/logs

  # ----------------------------------------------------------------------
  # Fetcher Lambda Function (Get Logs for Dashboard)
  # ----------------------------------------------------------------------
  FetcherFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/fetcher/
      Handler: app.handler
      Runtime: nodejs20.x
      Architectures:
        - x86_64
      Environment:
        Variables:
          TABLE_NAME: !Ref ColorTimerLogsTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ColorTimerLogsTable
      Events:
        FetcherApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ColorTimerApi
            Method: GET
            Path: /api/logs

Outputs:
  ApiEndpoint:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ColorTimerApi}.execute-api.${AWS::Region}.amazonaws.com/prod/api/logs"
  DynamoDBTableName:
    Description: "DynamoDB Table Name"
    Value: !Ref ColorTimerLogsTable

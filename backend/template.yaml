AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  ColorTimerNext Backend

  SAM Template for ColorTimer Next Project (API Gateway + DynamoDB)

Globals:
  Function:
    Timeout: 5
    MemorySize: 128

Resources:
  # ----------------------------------------------------------------------
  # DynamoDB Table
  # ----------------------------------------------------------------------
  ColorTimerLogsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ColorTimerLogs
      # オンデマンド課金 (無料枠の範囲内で安価に収めるため)
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: DeviceId
          AttributeType: S
        - AttributeName: Timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: DeviceId
          KeyType: HASH
        - AttributeName: Timestamp
          KeyType: RANGE
      # TTLの設定 (ExpireAt)
      TimeToLiveSpecification:
        AttributeName: ExpireAt
        Enabled: true

  # ----------------------------------------------------------------------
  # API Gateway (REST API) with API Key
  # ----------------------------------------------------------------------
  ColorTimerApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,X-Api-Key'"
        AllowMethods: "'GET,POST,OPTIONS'"
      Auth:
        ApiKeyRequired: true # 全メソッドに対してデフォルトでAPIキーを要求する
        UsagePlan:
          CreateUsagePlan: PER_API
          Description: "ColorTimerNext Usage Plan"

  # ----------------------------------------------------------------------
  # Receiver Lambda Function
  # ----------------------------------------------------------------------
  ReceiverFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/receiver/
      Handler: app.handler
      Runtime: nodejs20.x
      Architectures:
        - x86_64
      Environment:
        Variables:
          TABLE_NAME: !Ref ColorTimerLogsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ColorTimerLogsTable
      Events:
        ReceiverApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ColorTimerApi
            Method: POST
            Path: /api/logs

  # ----------------------------------------------------------------------
  # Fetcher Lambda Function (Get Logs for Dashboard)
  # ----------------------------------------------------------------------
  FetcherFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/fetcher/
      Handler: app.handler
      Runtime: nodejs20.x
      Architectures:
        - x86_64
      Environment:
        Variables:
          TABLE_NAME: !Ref ColorTimerLogsTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ColorTimerLogsTable
      Events:
        FetcherApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ColorTimerApi
            Method: GET
            Path: /api/logs

  # ----------------------------------------------------------------------
  # Frontend S3 Bucket
  # ----------------------------------------------------------------------
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      # OACを利用するためパブリックアクセスブロックは有効化しておく（デフォルト）
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ----------------------------------------------------------------------
  # CloudFront Origin Access Control (OAC)
  # ----------------------------------------------------------------------
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ----------------------------------------------------------------------
  # CloudFront Distribution
  # ----------------------------------------------------------------------
  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2
        # SPAルーティング対応 (403, 404を200/index.htmlへ)
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        Origins:
          - Id: FrontendS3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: FrontendS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt BasicAuthFunction.FunctionMetadata.FunctionARN

  # ----------------------------------------------------------------------
  # CloudFront Function for Basic Auth
  # ----------------------------------------------------------------------
  BasicAuthFunction:
    Type: AWS::CloudFront::Function
    Properties:
      AutoPublish: true
      FunctionConfig:
        Comment: "Basic Authentication for Frontend"
        Runtime: cloudfront-js-1.0
      FunctionCode: !Sub |
        function handler(event) {
            var request = event.request;
            var headers = request.headers;
            
            // default: admin:password
            var expectedAuth = "Basic YWRtaW46cGFzc3dvcmQ=";
            
            if (
                !headers.authorization ||
                headers.authorization.value !== expectedAuth
            ) {
                return {
                    statusCode: 401,
                    statusDescription: "Unauthorized",
                    headers: {
                        "www-authenticate": { value: 'Basic realm="ColorTimerNext"' }
                    }
                };
            }
            return request;
        }
      Name: !Sub "${AWS::StackName}-BasicAuth"

  # ----------------------------------------------------------------------
  # S3 Bucket Policy (OAC Config)
  # ----------------------------------------------------------------------
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: "cloudfront.amazonaws.com"
            Action: "s3:GetObject"
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

Outputs:
  ApiEndpoint:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ColorTimerApi}.execute-api.${AWS::Region}.amazonaws.com/prod/api/logs"
  DynamoDBTableName:
    Description: "DynamoDB Table Name"
    Value: !Ref ColorTimerLogsTable
  FrontendBucketName:
    Description: "Frontend S3 Bucket Name"
    Value: !Ref FrontendBucket
  CloudFrontDomainName:
    Description: "CloudFront Distribution Domain Name"
    Value: !GetAtt FrontendDistribution.DomainName
